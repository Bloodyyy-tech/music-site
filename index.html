<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POXOTB Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa; --surface: rgba(255,255,255,0.25); --border: rgba(255,255,255,0.2);
            --text: #1a1a1a; --text-dim: #888; --accent: #1a1a1a;
            --radius: 20px;
            --bg-image: url('https://i.ibb.co/GQ8dq3DW/image.png');
            --bg-opacity: 0.4;
            --transition-speed: 3s;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; min-height: 100vh;
            transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
        }
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-image);
            background-size: cover; background-position: center;
            background-repeat: no-repeat;
            opacity: var(--bg-opacity); pointer-events: none; z-index: 0;
            transition: opacity var(--transition-speed) ease, background-image var(--transition-speed) ease;
            image-rendering: auto;
            filter: none;
        }
        .content { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 40px 20px 60px; }
        .header { text-align: center; padding: 50px 0 30px; }
        .header-badge {
            display: inline-block; background: var(--accent); color: #fff;
            padding: 8px 22px; border-radius: 50px; font-size: 0.7em;
            letter-spacing: 4px; margin-bottom: 20px;
            transition: background var(--transition-speed) ease;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5em; font-weight: 900; letter-spacing: 8px;
            color: var(--text); line-height: 1;
            transition: color var(--transition-speed) ease;
        }
        .header .sub {
            font-size: 0.85em; color: var(--text-dim); letter-spacing: 5px;
            margin-top: 12px; font-weight: 300;
        }
        .playlist-nav {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .playlist-btn {
            padding: 10px 20px; border-radius: 50px; font-size: 0.85em;
            font-weight: 600; cursor: pointer; letter-spacing: 2px;
            border: 2px solid transparent; transition: all var(--transition-speed) ease;
            font-family: 'Playfair Display', serif;
        }
        .playlist-btn.zxc-btn { background: rgba(10,10,10,0.7); color: #ff1a1a; border-color: rgba(255,26,26,0.3); }
        .playlist-btn.gym-btn { background: rgba(255,255,255,0.7); color: #1a1a1a; border-color: rgba(0,0,0,0.2); }
        .playlist-btn.sad-btn { background: rgba(10,10,26,0.7); color: #4a8aff; border-color: rgba(74,138,255,0.3); }
        .playlist-btn.mix-btn { background: rgba(255,240,245,0.7); color: #c06080; border-color: rgba(192,96,128,0.3); }
        .playlist-btn.active { transform: scale(1.08); }
        .playlist-btn.zxc-btn.active { box-shadow: 0 0 25px rgba(255,0,0,0.3); }
        .playlist-btn.sad-btn.active { box-shadow: 0 0 25px rgba(70,130,255,0.3); }
        .playlist-btn.mix-btn.active { box-shadow: 0 0 25px rgba(255,150,180,0.3); }

        .player-card {
            background: transparent;
            border: none;
            border-radius: var(--radius); padding: 40px 30px;
            margin-bottom: 30px; text-align: center;
            backdrop-filter: none;
            transition: all var(--transition-speed) ease;
        }
        .cover-wrap { position: relative; width: 240px; height: 240px; margin: 0 auto 30px; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.15)); }
        .cover {
            width: 100%; height: 100%; border-radius: 50%; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif; font-size: 5em; font-weight: 900;
            background: rgba(255,255,255,0.2);
            color: var(--accent); border: 1px solid rgba(255,255,255,0.3);
            background-size: cover; background-position: center;
            animation: rotateVinyl 20s linear infinite paused;
            transition: color var(--transition-speed) ease;
        }
        .cover.playing { animation-play-state: running; }
        @keyframes rotateVinyl { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .cover-hole { position: absolute; width: 30px; height: 30px; background: rgba(255,255,255,0.3); border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); z-index: 2; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .cover-hole::after { content: ''; position: absolute; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .now-title { font-family: 'Playfair Display', serif; font-size: 1.5em; font-weight: 700; color: var(--text); margin-bottom: 5px; transition: color var(--transition-speed) ease; }
        .now-artist { font-size: 0.9em; color: var(--text-dim); margin-bottom: 4px; }
        .now-uploader { font-size: 0.75em; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 1px; opacity: 0.7; }
        .now-duration { font-size: 0.8em; color: var(--text-dim); margin-bottom: 20px; opacity: 0.6; }
        .progress-wrap { width: 100%; margin-bottom: 20px; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.15s linear, background var(--transition-speed) ease; }
        .progress-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; background: var(--accent); border-radius: 50%; left: 0%; transition: left 0.15s linear, background var(--transition-speed) ease; }
        .controls { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .ctrl-btn { background: none; border: none; font-size: 1.5em; cursor: pointer; color: var(--text); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .ctrl-btn:hover { background: rgba(255,255,255,0.1); }
        .ctrl-btn.play-btn { background: var(--accent); color: #fff; width: 65px; height: 65px; font-size: 1.8em; box-shadow: 0 4px 20px rgba(0,0,0,0.15); transition: all 0.3s; }
        .ctrl-btn.play-btn:hover { opacity: 0.85; transform: scale(1.05); }
        .volume-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .volume-row input[type="range"] { width: 100px; accent-color: var(--accent); height: 3px; }
        .vol-icon { font-size: 0.9em; color: var(--text-dim); cursor: pointer; }
        audio { display: none; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 1.2em; font-weight: 700; letter-spacing: 3px; color: var(--text); text-align: center; margin-bottom: 20px; transition: color var(--transition-speed) ease; }
        .track-list { background: transparent; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; backdrop-filter: none; transition: all var(--transition-speed) ease; }
        .track-item { display: flex; align-items: center; gap: 12px; padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.25s; }
        .track-item:last-child { border-bottom: none; }
        .track-item:hover { background: rgba(255,255,255,0.05); }
        .track-item.active { background: rgba(255,255,255,0.1); }
        .track-num { width: 28px; font-size: 0.85em; color: var(--text-dim); text-align: center; flex-shrink: 0; font-family: 'Playfair Display', serif; opacity: 0.6; }
        .track-item.active .track-num { color: var(--accent); font-weight: 700; opacity: 1; }
        .track-cover-sm { width: 48px; height: 48px; border-radius: 14px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 1.4em; font-weight: 700; color: var(--accent); flex-shrink: 0; background-size: cover; background-position: center; transition: color var(--transition-speed) ease; }
        .track-info { flex: 1; min-width: 0; }
        .track-name { font-weight: 600; color: var(--text); font-size: 0.95em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta { display: flex; gap: 10px; font-size: 0.75em; color: var(--text-dim); margin-top: 2px; opacity: 0.7; }
        .track-dur { font-size: 0.8em; color: var(--text-dim); flex-shrink: 0; opacity: 0.6; }
        .track-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-small { padding: 6px 14px; font-size: 0.75em; border-radius: 8px; background: rgba(255,255,255,0.1); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .btn-small:hover { background: rgba(255,255,255,0.2); color: var(--text); }
        .empty-state { text-align: center; padding: 70px 20px; color: var(--text-dim); }
        .empty-state .icon { font-size: 4em; margin-bottom: 15px; opacity: 0.5; }
        .empty-state p { font-size: 0.9em; letter-spacing: 1px; opacity: 0.6; }
        footer { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 0.75em; letter-spacing: 2px; transition: color var(--transition-speed) ease; opacity: 0.5; }
        @media (max-width: 600px) {
            .header h1 { font-size: 2.2em; }
            .cover-wrap { width: 170px; height: 170px; }
            .cover { font-size: 3.5em; }
            .player-card { padding: 25px 18px; }
            .controls { gap: 15px; }
            .ctrl-btn.play-btn { width: 55px; height: 55px; font-size: 1.5em; }
        }
    </style>
</head>
<body>

<div class="bg-layer" id="bgLayer"></div>

<div class="content">
    <div class="header">
        <div class="header-badge">MUSIC</div>
        <h1>POXOTB</h1>
        <p class="sub">загружай через бота и слушай</p>
    </div>

    <div class="playlist-nav">
        <button class="playlist-btn zxc-btn active" onclick="setPlaylist('zxc')">zxc</button>
        <button class="playlist-btn gym-btn" onclick="setPlaylist('gym')">gym</button>
        <button class="playlist-btn sad-btn" onclick="setPlaylist('sad')">sad</button>
        <button class="playlist-btn mix-btn" onclick="setPlaylist('mix')">mix</button>
    </div>

    <div class="player-card">
        <div class="cover-wrap">
            <div class="cover" id="nowCover">🎵</div>
            <div class="cover-hole"></div>
        </div>
        <div class="now-title" id="nowTitle">Выбери трек</div>
        <div class="now-artist" id="nowArtist">—</div>
        <div class="now-uploader" id="nowUploader"></div>
        <div class="now-duration" id="nowDuration"></div>
        <div class="progress-wrap">
            <div class="progress-bar" onclick="seek(event)">
                <div class="progress-fill" id="progressFill"></div>
                <div class="progress-dot" id="progressDot"></div>
            </div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
            <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
        </div>
        <div class="volume-row">
            <span class="vol-icon" onclick="muteToggle()">🔈</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="80" oninput="changeVolume(this.value)">
            <span class="vol-icon">🔊</span>
        </div>
    </div>

    <div class="section-title" id="sectionTitle">ТРЕКИ — zxc</div>
    <div class="track-list" id="trackList">
        <div class="empty-state"><div class="icon">🎵</div><p>Загрузка...</p></div>
    </div>

    <footer>POXOTI_NETU © 2026</footer>
    <audio id="audio" ontimeupdate="updateProgress()" onended="nextTrack()" onloadedmetadata="updateMeta()"></audio>
</div>

<script>
const SERVER_URL = 'https://worker-production-1bf9.up.railway.app';

const PLAYLIST_CONFIG = {
    zxc: {
        bg: 'url(https://i.ibb.co/NdFPnN4v/5.jpg)',
        bgOpacity: 0.5,
        surface: 'transparent', text: '#ffffff', textDim: '#cccccc',
        accent: '#ff1a1a', border: 'rgba(255,255,255,0.15)'
    },
    gym: {
        bg: 'url(https://i.ibb.co/67RJxNHQ/6.jpg)',
        bgOpacity: 0.5,
        surface: 'transparent', text: '#1a1a1a', textDim: '#666666',
        accent: '#1a1a1a', border: 'rgba(0,0,0,0.15)'
    },
    sad: {
        bg: 'url(https://i.ibb.co/h1hXwm4w/7.jpg)',
        bgOpacity: 0.5,
        surface: 'transparent', text: '#d0e0ff', textDim: '#8a9abb',
        accent: '#4a8aff', border: 'rgba(255,255,255,0.15)'
    },
    mix: {
        bg: 'url(https://i.ibb.co/5WPZMttg/cats-cherryblossom-aesthetic-pink.jpg)',
        bgOpacity: 0.5,
        surface: 'transparent', text: '#4a2030', textDim: '#b0909a',
        accent: '#c06080', border: 'rgba(255,255,255,0.15)'
    }
};

let currentPlaylist = 'zxc';
let tracks = [], currentIndex = -1, isPlaying = false, prevVolume = 80;
const audio = document.getElementById('audio'), playBtn = document.getElementById('playBtn');
const root = document.documentElement;

function setPlaylist(pl) {
    currentPlaylist = pl;
    const cfg = PLAYLIST_CONFIG[pl];
    root.style.setProperty('--bg-image', cfg.bg);
    root.style.setProperty('--bg-opacity', cfg.bgOpacity);
    root.style.setProperty('--surface', cfg.surface);
    root.style.setProperty('--text', cfg.text);
    root.style.setProperty('--text-dim', cfg.textDim);
    root.style.setProperty('--accent', cfg.accent);
    root.style.setProperty('--border', cfg.border);
    document.getElementById('sectionTitle').textContent = 'ТРЕКИ — ' + pl;
    document.querySelectorAll('.playlist-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.' + pl + '-btn').classList.add('active');
    renderTracks();
}

function addCover(trackId) {
    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = function() {
        if (!inp.files[0]) return;
        const r = new FileReader();
        r.onload = function(e) {
            fetch(`${SERVER_URL}/add_cover`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: trackId, cover: e.target.result.split(',')[1] })
            }).then(r => r.json()).then(d => { if (d.ok) { loadTracks(); if (currentIndex >= 0 && tracks[currentIndex]?.id === trackId) updateCover(currentIndex); } });
        };
        r.readAsDataURL(inp.files[0]);
    };
    inp.click();
}

async function loadTracks() {
    try {
        const r = await fetch(`${SERVER_URL}/api/tracks`), d = await r.json();
        tracks = d.tracks || [];
        if (tracks.length > 0 && currentIndex === -1) {
            const first = tracks.find(t => (t.playlist || 'mix') === currentPlaylist) || tracks[0];
            const idx = tracks.indexOf(first);
            document.getElementById('nowTitle').textContent = first.title;
            document.getElementById('nowArtist').textContent = first.artist;
            document.getElementById('nowUploader').textContent = 'выложил: ' + (first.uploader || 'неизвестен');
            updateCover(idx);
        }
        renderTracks();
    } catch(e) { document.getElementById('trackList').innerHTML = '<div class="empty-state"><div class="icon">🔌</div><p>Сервер недоступен</p></div>'; }
}

function playTrack(index) {
    if (index < 0 || index >= tracks.length) return;
    currentIndex = index; const t = tracks[index];
    audio.src = `${SERVER_URL}/music/${t.file}`; audio.play();
    isPlaying = true; playBtn.textContent = '⏸';
    document.getElementById('nowTitle').textContent = t.title;
    document.getElementById('nowArtist').textContent = t.artist;
    document.getElementById('nowUploader').textContent = 'выложил: ' + (t.uploader || 'неизвестен');
    updateCover(index); updateMeta(); renderTracks();
    document.getElementById('nowCover').classList.add('playing');
}

function togglePlay() {
    if (tracks.length === 0) return;
    if (currentIndex === -1) { playTrack(0); return; }
    if (isPlaying) { audio.pause(); isPlaying = false; playBtn.textContent = '▶'; document.getElementById('nowCover').classList.remove('playing'); }
    else { audio.play(); isPlaying = true; playBtn.textContent = '⏸'; document.getElementById('nowCover').classList.add('playing'); }
}
function nextTrack() {
    const filtered = tracks.filter(t => (t.playlist || 'mix') === currentPlaylist);
    if (!filtered.length) return;
    let idx = filtered.indexOf(tracks[currentIndex]);
    let next = idx + 1; if (next >= filtered.length) next = 0;
    playTrack(tracks.indexOf(filtered[next]));
}
function prevTrack() {
    const filtered = tracks.filter(t => (t.playlist || 'mix') === currentPlaylist);
    if (!filtered.length) return;
    let idx = filtered.indexOf(tracks[currentIndex]);
    let prev = idx - 1; if (prev < 0) prev = filtered.length - 1;
    playTrack(tracks.indexOf(filtered[prev]));
}
function updateMeta() {
    if (currentIndex >= 0 && tracks[currentIndex]) {
        if (!tracks[currentIndex].duration && audio.duration) tracks[currentIndex].duration = Math.floor(audio.duration);
        document.getElementById('nowDuration').textContent = formatDuration(tracks[currentIndex].duration || Math.floor(audio.duration));
    }
}
function updateProgress() { const p = (audio.currentTime / audio.duration) * 100 || 0; document.getElementById('progressFill').style.width = p + '%'; document.getElementById('progressDot').style.left = p + '%'; }
function seek(e) { const r = e.target.getBoundingClientRect(); audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration; }
function changeVolume(v) { audio.volume = v / 100; prevVolume = v; }
function muteToggle() {
    if (audio.volume > 0) { audio.volume = 0; document.getElementById('volumeSlider').value = 0; }
    else { audio.volume = prevVolume / 100; document.getElementById('volumeSlider').value = prevVolume; }
}
function updateCover(i) {
    if (i < 0 || i >= tracks.length) return;
    const t = tracks[i], c = document.getElementById('nowCover');
    if (t.cover) { c.style.backgroundImage = `url(${SERVER_URL}/covers/${t.cover})`; c.style.backgroundSize = 'cover'; c.style.backgroundPosition = 'center'; c.textContent = ''; }
    else { c.style.backgroundImage = ''; c.textContent = t.title.charAt(0).toUpperCase() || '🎵'; }
}
function renderTracks() {
    const c = document.getElementById('trackList');
    const filtered = tracks.filter(t => (t.playlist || 'mix') === currentPlaylist);
    if (!filtered.length) { c.innerHTML = '<div class="empty-state"><div class="icon">🎵</div><p>Нет треков в этом плейлисте</p><p style="font-size:0.75em;">Отправь MP3 боту и выбери плейлист ' + currentPlaylist + '</p></div>'; return; }
    c.innerHTML = filtered.map((t) => {
        const i = tracks.indexOf(t);
        const cs = t.cover ? `background-image:url(${SERVER_URL}/covers/${t.cover});background-size:cover;background-position:center;color:transparent` : '';
        const cl = t.cover ? '' : (t.title.charAt(0).toUpperCase() || '🎵');
        return `<div class="track-item ${i === currentIndex && isPlaying ? 'active' : ''}">
            <div class="track-num" onclick="playTrack(${i})">${i === currentIndex && isPlaying ? '' : (filtered.indexOf(t)+1)}</div>
            <div class="track-cover-sm" style="${cs}" onclick="playTrack(${i})">${cl}</div>
            <div class="track-info" onclick="playTrack(${i})"><div class="track-name">${t.title}</div><div class="track-meta"><span>${t.artist}</span><span>• ${t.uploader||'неизвестен'}</span></div></div>
            <div class="track-dur" onclick="playTrack(${i})">${formatDuration(t.duration)}</div>
            <div class="track-actions"><button class="btn-small" onclick="event.stopPropagation();addCover('${t.id}')">🖼</button></div>
        </div>`;
    }).join('');
}
function formatDuration(s) {
    if (!s) { if (currentIndex >= 0 && tracks[currentIndex] && audio.duration) s = Math.floor(audio.duration); else return '--:--'; }
    return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}

setPlaylist('zxc');
loadTracks();
</script>
</body>
</html>
